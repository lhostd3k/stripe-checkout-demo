<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful — TestPay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a120e;
      --surface: #111a14;
      --border: #1e2e22;
      --accent: #00e5a0;
      --accent-dim: rgba(0,229,160,0.1);
      --text: #f0f0f0;
      --muted: #6b8f77;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      top: -150px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(0,229,160,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 460px;
      width: 100%;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }

    .checkmark {
      width: 72px;
      height: 72px;
      background: var(--accent-dim);
      border: 2px solid var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1.5rem;
      animation: pulse 2.5s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,229,160,0.3); }
      50%       { box-shadow: 0 0 0 14px rgba(0,229,160,0); }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      color: var(--accent);
    }

    .tagline {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .receipt {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      text-align: left;
    }

    .receipt-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      font-size: 0.9rem;
    }

    .receipt-row + .receipt-row {
      border-top: 1px solid var(--border);
    }

    .receipt-label { color: var(--muted); }

    .receipt-value {
      font-weight: 500;
    }

    .receipt-value.green {
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(0,229,160,0.25);
      padding: 3px 10px;
      border-radius: 99px;
    }

    .back-btn {
      display: inline-block;
      padding: 0.8rem 2rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #000;
      background: var(--accent);
      border-radius: 10px;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,229,160,0.3);
    }

    .note {
      margin-top: 1.25rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="checkmark">✓</div>
    <h1>Payment Successful!</h1>
    <p class="tagline">Your test transaction was processed.</p>

    <div class="receipt">
      <div class="receipt-row">
        <span class="receipt-label">Item</span>
        <span class="receipt-value">$1 Test Item</span>
      </div>
      <div class="receipt-row">
        <span class="receipt-label">Description</span>
        <span class="receipt-value">University assignment demo</span>
      </div>
      <div class="receipt-row">
        <span class="receipt-label">Amount Charged</span>
        <span class="receipt-value green">$1.00</span>
      </div>
      <div class="receipt-row">
        <span class="receipt-label">Status</span>
        <span class="receipt-value">
          <span class="status-badge">● Paid</span>
        </span>
      </div>
      <div class="receipt-row">
        <span class="receipt-label">Mode</span>
        <span class="receipt-value">Stripe Test Mode</span>
      </div>
    </div>

    <a href="/" class="back-btn">← Back to Store</a>
    <p class="note">No real money was charged. This is a test transaction.</p>
  </div>

</body>
</html>
