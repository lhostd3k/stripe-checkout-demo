<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Cancelled — TestPay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #110e0a;
      --surface: #1a1511;
      --border: #2e2518;
      --accent: #f5a623;
      --accent-dim: rgba(245,166,35,0.1);
      --text: #f0f0f0;
      --muted: #8f7b55;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      top: -150px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 350px;
      background: radial-gradient(ellipse, rgba(245,166,35,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon {
      width: 72px;
      height: 72px;
      background: var(--accent-dim);
      border: 2px solid var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1.5rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      color: var(--accent);
    }

    p {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .info-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 2rem;
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.6;
      text-align: left;
    }

    .info-box strong { color: var(--text); }

    .try-btn {
      display: inline-block;
      padding: 0.8rem 2rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #000;
      background: var(--accent);
      border-radius: 10px;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .try-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(245,166,35,0.3);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">✕</div>
    <h1>Payment Cancelled</h1>
    <p>You cancelled the checkout. No charge was made to your card.</p>

    <div class="info-box">
      <strong>What happened?</strong><br />
      You closed or cancelled the Stripe checkout page before completing your payment.
      Your card was <strong>not charged</strong>.
      You can try again any time.
    </div>

    <a href="/" class="try-btn">← Try Again</a>
  </div>

</body>
</html>
