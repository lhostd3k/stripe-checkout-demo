<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TestPay — $1 Demo Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #00e5a0;
      --accent-dim: rgba(0,229,160,0.12);
      --text: #f0f0f0;
      --muted: #888;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow blob */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse at center, rgba(0,229,160,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 32px 80px rgba(0,0,0,0.5);
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(0,229,160,0.25);
      padding: 5px 12px;
      border-radius: 99px;
      margin-bottom: 1.5rem;
    }

    .badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .product-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      text-align: left;
    }

    .product-info h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .product-info p {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .price-tag {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent);
      white-space: nowrap;
    }

    /* THE BUY BUTTON */
    #buy-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 1rem 2rem;
      font-family: 'Syne', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #000;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      box-shadow: 0 0 0 0 rgba(0,229,160,0.4);
      position: relative;
      overflow: hidden;
    }

    #buy-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,229,160,0.35);
    }

    #buy-btn:active {
      transform: translateY(0px);
      box-shadow: none;
    }

    #buy-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-icon {
      font-size: 1.1rem;
    }

    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #buy-btn.loading .btn-icon { display: none; }
    #buy-btn.loading .spinner { display: block; }

    .secure-note {
      margin-top: 1.25rem;
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .error-msg {
      display: none;
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      background: rgba(255, 80, 80, 0.1);
      border: 1px solid rgba(255, 80, 80, 0.3);
      border-radius: 8px;
      color: #ff6b6b;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="badge">Stripe Test Mode</div>

    <h1>Demo <span>Checkout</span></h1>
    <p class="subtitle">
      A minimal Stripe Checkout integration demo.<br />
      No real charge — test mode only.
    </p>

    <div class="product-box">
      <div class="product-info">
        <h2>$1 Test Item</h2>
        <p>University assignment demo product</p>
      </div>
      <div class="price-tag">$1.00</div>
    </div>

    <button id="buy-btn" onclick="startCheckout()">
      <span class="btn-icon">🛒</span>
      <span class="btn-label">Buy $1 Test Item</span>
      <div class="spinner"></div>
    </button>

    <p class="secure-note">
      🔒 Powered by Stripe · 256-bit SSL · No real charges
    </p>

    <div class="error-msg" id="error-msg">
      Something went wrong. Please try again or check the server.
    </div>
  </div>

  <script>
    async function startCheckout() {
      const btn = document.getElementById('buy-btn');
      const errorEl = document.getElementById('error-msg');

      // Show loading state
      btn.disabled = true;
      btn.classList.add('loading');
      btn.querySelector('.btn-label').textContent = 'Redirecting…';
      errorEl.style.display = 'none';

      try {
        const response = await fetch('/create-checkout-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.error || 'Server error');
        }

        const { url } = await response.json();

        if (!url) throw new Error('No checkout URL returned from server.');

        // Redirect to Stripe-hosted checkout
        window.location.href = url;

      } catch (err) {
        console.error('Checkout error:', err);
        errorEl.textContent = '⚠️ ' + err.message;
        errorEl.style.display = 'block';

        // Reset button
        btn.disabled = false;
        btn.classList.remove('loading');
        btn.querySelector('.btn-label').textContent = 'Buy $1 Test Item';
      }
    }
  </script>

</body>
</html>
